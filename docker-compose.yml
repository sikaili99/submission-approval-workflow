# Brings up the whole app — database, backend, and frontend — with one
# command. The backend waits for Postgres to be healthy, then applies
# migrations, seeds, and starts. The frontend is built and served by nginx.
#
# After `docker compose up --build`:
#   Frontend  http://localhost:8080
#   Backend   http://localhost:4000
#
# The brief asks only for db + backend in compose; the frontend service is
# included here for a turnkey demo. To run db + backend only and start the
# frontend separately with Vite, use:  docker compose up db backend
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-approvals}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-approvals}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-approvals}?schema=public
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
